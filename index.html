<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

    <!-- Importación de estilos -->
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/style-movil.css" />
    <link rel="stylesheet" href="css/style-tablet.css" />

    <title>Frontend Mentor | Social links profile</title>

</head>

<body>

    <!-- Cuerpo de la tarjeta de presentación de Links sociales -->
    <main class="social-links">

        <!-- Avatar -->
        <img class="avatar" src="./assets/images/avatar.webp" alt="Avaratar de usuario">

        <!-- Nombre de titular -->
        <h1 class="nombre">Lionsyseng</h1>

        <!-- Dirección -->
        <p class="direction">London, United Kingdon</p>

        <!-- Características -->
        <p class="message">"Desarrollador front-end y ávido lector."</p>

        <!-- Botones de redes scociales -->
        <input id="github" class="button" type="button" value="GitHub">

        <input id="frontend" class="button" type="button" value="Frontend Mentor">

        <input id="linkedin" class="button" type="button" value="Linkedin">

        <input id="twiter" class="button" type="button" value="Twiter">

        <input id="button" class="button" type="button" value="Instagram">
        
    </main>
    
    <!-- Sección footer -->
    <footer class="attribution">

        Desafío de <a href="http://www.frontendmentor.io?ref=challenge" target="_blank"
            rel="noopener noreferrer">Frontend Mentor</a>
        - Codificado por <a href="http://www.frontendmentor.io?ref=challenge" target="_blank"
            rel="noopener noreferrer">Lionsyseng</a>

    </footer>

    <!-- Importación de manejo de control con JavaScript-->
    <script src="js/codigo.js"></script>
</body>

</html>
